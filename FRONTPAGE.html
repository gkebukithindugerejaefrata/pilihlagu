<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:28px;
    padding:30px 24px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
}

.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid rgba(255,255,255,.2);
    margin-bottom:15px;
}

h1{
    color:white;
    font-size:1.6rem;
    font-weight:600;
}

.bio{
    color:#cbd5e1;
    font-size:0.95rem;
    margin-top:8px;
    margin-bottom:28px;
    line-height:1.5;
}

.links{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.link-btn{
    text-decoration:none;
    background:white;
    color:#0f172a;
    padding:16px;
    border-radius:16px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    transition:.25s;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.link-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.25);
}

.link-btn span{
    font-size:1.2rem;
}

.socials{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:14px;
}

.socials a{
    width:48px;
    height:48px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-decoration:none;
    font-size:1.2rem;
    transition:.25s;
}

.socials a:hover{
    background:white;
    color:#0f172a;
}

.footer{
    margin-top:25px;
    color:#94a3b8;
    font-size:.8rem;
}

@media(max-width:480px){
    .card{
        padding:25px 18px;
    }

    h1{
        font-size:1.4rem;
    }

    .link-btn{
        padding:15px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="card">

        <img src="profil.jpg"
             alt="Profile"
             class="profile">

        <h1>Bayu Adinegara</h1>

        <p class="bio">
            Wedding MC • Developer • Content Creator
            <br>
            Semua link penting ada di sini.
        </p>

        <div class="links">

            <a href="#" class="link-btn">
                <span>🌐</span>
                Website Resmi
            </a>

            <a href="#" class="link-btn">
                <span>📸</span>
                Instagram
            </a>

            <a href="#" class="link-btn">
                <span>🎵</span>
                TikTok
            </a>

            <a href="#" class="link-btn">
                <span>▶️</span>
                YouTube
            </a>

            <a href="#" class="link-btn">
                <span>💬</span>
                WhatsApp
            </a>

        </div>

        <div class="socials">
            <a href="#">📘</a>
            <a href="#">📸</a>
            <a href="#">🎵</a>
            <a href="#">▶️</a>
        </div>

        <div class="footer">
            © 2026 Bayu Adinegara
        </div>

    </div>

</div>

</body>
</html>
