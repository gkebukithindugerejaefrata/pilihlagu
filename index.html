<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bayu Adinegara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0f172a;
    --bg2:#1e293b;
    --card:rgba(255,255,255,.08);
    --text:#ffffff;
    --sub:#cbd5e1;
    --btn:#ffffff;
    --btntext:#111827;
}

.light{
    --bg:#f1f5f9;
    --bg2:#e2e8f0;
    --card:rgba(255,255,255,.85);
    --text:#0f172a;
    --sub:#475569;
    --btn:#0f172a;
    --btntext:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,var(--bg),var(--bg2));
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:20px;
    transition:.3s;
}

.container{
    width:100%;
    max-width:460px;
}

.card{
    overflow:hidden;
    border-radius:28px;
    background:var(--card);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.banner{
    height:180px;
    background:url('banner.jpg') center/cover;
    position:relative;
    transition:transform .1s;
}

.profile-wrap{
    text-align:center;
    margin-top:-55px;
    position:relative;
    z-index:5;
}

.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.content{
    padding:20px;
}

h1{
    text-align:center;
    margin-top:10px;
}

.bio{
    text-align:center;
    margin-top:8px;
    color:var(--sub);
}

.theme-btn{
    position:absolute;
    right:15px;
    top:15px;
    border:none;
    width:42px;
    height:42px;
    border-radius:50%;
    cursor:pointer;
    background:rgba(255,255,255,.2);
    color:white;
    backdrop-filter:blur(10px);
}

.links{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:25px;
}

.link{
    background:var(--btn);
    color:var(--btntext);
    text-decoration:none;
    padding:15px;
    border-radius:16px;
    text-align:center;
    font-weight:600;
    transition:.25s;
}

.link:hover{
    transform:translateY(-3px);
}

.section-title{
    margin-top:28px;
    margin-bottom:12px;
    font-weight:600;
}

.media-card{
    border-radius:18px;
    overflow:hidden;
    background:rgba(255,255,255,.08);
    margin-bottom:16px;
}

.media-card iframe{
    width:100%;
    border:none;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:var(--sub);
    font-size:.85rem;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="banner" id="banner">
<button class="theme-btn" onclick="toggleTheme()">
🌓
</button>
</div>

<div class="profile-wrap">
<img src="profil.jpg" class="profile">
</div>

<div class="content">

<h1>Bayu Adinegara</h1>

<div class="bio">
Wedding MC • Developer • Content Creator
</div>

<div class="links">

<a href="#" class="link">🌐 Website</a>
<a href="#" class="link">📸 Instagram</a>
<a href="#" class="link">🎵 TikTok</a>
<a href="#" class="link">💬 WhatsApp</a>

</div>

<div class="section-title">
🎵 Spotify
</div>

<div class="media-card">

<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/4iV5W9uYEdYUVa79Axb7Rh"
height="152"
allowfullscreen=""
loading="lazy">
</iframe>

</div>

<div class="section-title">
▶ YouTube
</div>

<div class="media-card">

<iframe
height="220"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen>
</iframe>

</div>

<div class="footer">
© 2026 Bayu Adinegara
</div>

</div>

</div>

</div>

<script>

// Theme

const savedTheme =
localStorage.getItem("theme");

if(savedTheme==="light"){
    document.body.classList.add("light");
}

function toggleTheme(){

    document.body.classList.toggle("light");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("light")
        ? "light"
        : "dark"
    );
}

// Parallax Banner

const banner =
document.getElementById("banner");

window.addEventListener("scroll",()=>{

    const scroll =
    window.pageYOffset;

    banner.style.transform =
    `translateY(${scroll*0.3}px)`;

});

</script>

</body>
</html>
