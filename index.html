<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Links</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e293b,
    #334155);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow-x:hidden;
}

/* Background Glow */

.blob{
    position:fixed;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
}

.blob1{
    width:300px;
    height:300px;
    background:#38bdf8;
    top:-80px;
    right:-80px;
    opacity:.35;
}

.blob2{
    width:250px;
    height:250px;
    background:#8b5cf6;
    bottom:-80px;
    left:-80px;
    opacity:.3;
}

.container{
    width:100%;
    max-width:430px;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:28px;
    padding:30px 24px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.3);

    animation:fadeUp .8s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.profile{
    width:115px;
    height:115px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid rgba(255,255,255,.25);
    margin-bottom:15px;

    box-shadow:
    0 0 25px rgba(255,255,255,.2);
}

h1{
    color:white;
    font-size:1.6rem;
    font-weight:600;
}

.bio{
    color:#cbd5e1;
    font-size:.95rem;
    margin-top:8px;
    margin-bottom:28px;
    line-height:1.6;
}

.links{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.link-btn{
    text-decoration:none;

    background:
    linear-gradient(
    135deg,
    #ffffff,
    #e2e8f0);

    color:#0f172a;

    padding:16px;
    border-radius:18px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    font-weight:600;

    transition:.25s;

    box-shadow:
    0 5px 15px rgba(0,0,0,.15);
}

.link-btn:hover{
    transform:translateY(-4px);
    box-shadow:
    0 12px 25px rgba(0,0,0,.25);
}

.link-btn i{
    font-size:1.2rem;
}

.socials{
    margin-top:28px;
    display:flex;
    justify-content:center;
    gap:14px;
}

.socials a{
    width:50px;
    height:50px;

    border-radius:50%;

    background:
    rgba(255,255,255,.15);

    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;

    transition:.25s;

    font-size:1.2rem;
}

.socials a:hover{
    background:white;
    color:#0f172a;
    transform:translateY(-3px);
}

.share-btn{
    margin-top:22px;

    border:none;

    background:
    rgba(255,255,255,.12);

    color:white;

    padding:12px 20px;

    border-radius:14px;

    cursor:pointer;

    transition:.25s;
}

.share-btn:hover{
    background:white;
    color:#0f172a;
}

.footer{
    margin-top:24px;
    color:#94a3b8;
    font-size:.8rem;
}

@media(max-width:480px){

    .card{
        padding:24px 18px;
    }

    h1{
        font-size:1.4rem;
    }

    .link-btn{
        padding:15px;
    }

}

</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">

    <div class="card">

        <!-- Ganti dengan foto Anda -->
        <img src="profil.jpg"
        class="profile"
        alt="Profile">

        <h1>Bayu Adinegara</h1>

        <p class="bio">
            Wedding MC • Developer • Content Creator
            <br>
            Semua link penting ada di sini.
        </p>

        <div class="links">

            <a href="https://websiteanda.com"
            target="_blank"
            class="link-btn">
                <i class="fas fa-globe"></i>
                Website Resmi
            </a>

            <a href="https://instagram.com/"
            target="_blank"
            class="link-btn">
                <i class="fab fa-instagram"></i>
                Instagram
            </a>

            <a href="https://tiktok.com/"
            target="_blank"
            class="link-btn">
                <i class="fab fa-tiktok"></i>
                TikTok
            </a>

            <a href="https://youtube.com/"
            target="_blank"
            class="link-btn">
                <i class="fab fa-youtube"></i>
                YouTube
            </a>

            <a href="https://wa.me/628123456789"
            target="_blank"
            class="link-btn">
                <i class="fab fa-whatsapp"></i>
                WhatsApp
            </a>

        </div>

        <div class="socials">

            <a href="#">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a href="#">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="#">
                <i class="fab fa-tiktok"></i>
            </a>

            <a href="#">
                <i class="fab fa-youtube"></i>
            </a>

        </div>

        <button class="share-btn" onclick="sharePage()">
            🔗 Bagikan Halaman
        </button>

        <div class="footer">
            © 2026 Bayu Adinegara
        </div>

    </div>

</div>

<script>

function sharePage(){

    if(navigator.share){

        navigator.share({
            title:document.title,
            url:window.location.href
        });

    }else{

        navigator.clipboard.writeText(
            window.location.href
        );

        alert("Link berhasil disalin!");
    }
}

</script>

</body>
</html>
